<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MEC Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,.1);
  width:320px;
}
h1{ text-align:center; }
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#2563eb;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.msg{
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">
  <h1>MEC</h1>

  <input id="email" type="email" placeholder="Correo">
  <input id="password" type="password" placeholder="Contraseña">

  <button onclick="crearCuenta()">Crear cuenta</button>
  <button onclick="login()">Ingresar</button>
  <button onclick="resetPass()">Recuperar contraseña</button>

  <div id="msg" class="msg"></div>
</div>

<!-- ✅ Librería Supabase (FALTABA) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- ✅ Tu cliente -->
<script src="supabaseClient.js"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const { data: { session } } = await supabase.auth.getSession();

  if(session){
    window.location.href = "app-protegida.html";
  }
});
</script>

<script>
function mensaje(texto,color="black"){
  const m=document.getElementById("msg");
  m.style.color=color;
  m.innerText=texto;
}

async function crearCuenta(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if(error){
    mensaje(error.message,"red");
  }else{
    mensaje("Cuenta creada. Revisa tu correo 📧","green");
  }
}

async function login(){
  const email=document.getElementById("email").value;
  const password=document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email: email,
    password: password
  });

  if(error){
    mensaje(error.message,"red");
  }else{
    mensaje("Ingreso correcto","green");
    window.location.replace("app-protegida.html");
  }
}

async function resetPass(){
  const email=document.getElementById("email").value;

  const { data, error } = await supabase.auth.resetPasswordForEmail(email);

  if(error){
    mensaje(error.message,"red");
  }else{
    mensaje("Correo de recuperación enviado 📧","green");
  }
}
</script>

</body>
</html>
